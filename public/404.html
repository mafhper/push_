<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Push_ redirect</title>
    <script>
      (function () {
        var base = "/push_/";
        var target = window.location.pathname + window.location.search + window.location.hash;
        sessionStorage.setItem("push_redirect", target);
        window.location.replace(base);
      })();
    </script>
  </head>
  <body></body>
  </html>
