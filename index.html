<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="description" content="Promo site and secure snapshot dashboard for published GitHub repositories." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <meta property="og:title" content="Push_ | Semantic GitHub Command Center" />

    <meta property="og:type" content="website" />
    
    <meta name="twitter:card" content="summary_large_image" />
    <script>
      (function () {
        const redirect = sessionStorage.getItem("push_redirect");
        if (!redirect) return;
        sessionStorage.removeItem("push_redirect");
        const url = new URL(redirect, window.location.origin);
        window.history.replaceState(null, "", url.pathname + url.search + url.hash);
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
